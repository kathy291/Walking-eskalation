<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Kathys Walking Eskalation V3
</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{

    --bg:#f8f5ef;
    --card:#ffffff;
    --gold:#d4af37;
    --green:#2fbf71;
    --red:#ff6b6b;
    --text:#2d2d2d;

    --shadow:
        0 12px 30px rgba(0,0,0,0.08);
}

*{
    box-sizing:border-box;
}

body{

    margin:0;

    padding:18px;

    padding-bottom:120px;

    background:var(--bg);

    color:var(--text);

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
}

.card{

    background:var(--card);

    border-radius:28px;

    padding:20px;

    margin-bottom:18px;

    box-shadow:var(--shadow);
}

.hero{

    border:3px solid var(--gold);

    background:
        linear-gradient(
            180deg,
            #fffdf7,
            #fff5d7
        );
}

.hero-km{

    font-size:2.5rem;

    font-weight:800;

    margin-top:10px;
}

.stats{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

.stat-number{

    font-size:1.5rem;

    font-weight:800;

    margin-top:10px;
}

.walk-card{

    border-left:8px solid var(--gold);
}

.walk-grid{

    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:10px;

    margin-top:16px;
}

.value-box{

    background:#f7f3eb;

    border-radius:18px;

    padding:12px;

    text-align:center;
}

.label{

    color:#666;

    font-size:0.82rem;
}

.good{

    color:var(--green);

    font-weight:700;
}

.bad{

    color:var(--red);

    font-weight:700;
}

.notes{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    margin-top:14px;
}

.note{

    background:#f4f1ea;

    border-radius:999px;

    padding:8px 12px;

    font-size:0.82rem;
}

.custom-note{

    margin-top:12px;

    font-style:italic;
}

.actions{

    display:flex;

    gap:10px;

    margin-top:18px;
}

button{

    border:none;

    cursor:pointer;

    border-radius:16px;

    font-size:1rem;
}

.action-btn{

    flex:1;

    padding:12px;

    font-weight:700;
}

.edit-btn{
    background:#f4f1ea;
}

.delete-btn{

    background:#ffecec;

    color:#c0392b;
}

.fab{

    position:fixed;

    right:22px;

    bottom:22px;

    width:72px;

    height:72px;

    border-radius:50%;

    background:var(--gold);

    color:white;

    font-size:2rem;

    box-shadow:
        0 16px 34px rgba(212,175,55,0.35);
}

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.45);

    display:none;

    align-items:flex-end;
}

.modal.open{
    display:flex;
}

.modal-content{

    background:white;

    width:100%;

    border-radius:28px 28px 0 0;

    padding:22px;

    max-height:92vh;

    overflow:auto;
}

input,
textarea{

    width:100%;

    margin-top:8px;

    margin-bottom:18px;

    padding:14px;

    border-radius:16px;

    border:1px solid #ddd;

    font-size:1rem;
}

.quick-notes{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:18px;
}

.quick-btn{

    background:#f4f1ea;

    padding:10px 14px;

    border-radius:999px;
}

.quick-btn.active{

    background:var(--gold);

    color:white;
}

.save-btn{

    width:100%;

    padding:16px;

    background:var(--gold);

    color:white;

    font-weight:800;
}

.calendar{

    display:grid;

    grid-template-columns:
        repeat(7,1fr);

    gap:8px;

    margin-top:16px;
}

.day{

    aspect-ratio:1;

    border-radius:14px;

    background:#f4f1ea;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:0.82rem;

    font-weight:700;
}

.day.walked{

    background:
        linear-gradient(
            180deg,
            #f7d978,
            #d4af37
        );

    color:white;
}

.badge{

    background:
        linear-gradient(
            180deg,
            #ffe89f,
            #d4af37
        );

    color:white;

    border-radius:20px;

    padding:14px;

    margin-top:12px;

    font-weight:800;

    text-align:center;
}

.goal-row{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

    margin-top:16px;
}

.goal{

    background:#f4f1ea;

    padding:10px 14px;

    border-radius:999px;

    font-weight:700;
}

.chart-box{
    margin-top:20px;
}

@media(max-width:420px){

    .stats{
        grid-template-columns:1fr;
    }

    .walk-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>
        👟 Kathys Walking Eskalation V3
    </h1>

    <div id="streakText">
        🔥 Noch keine Serie
    </div>

</div>

<div class="card hero">

    <div>
        Letzter Walk
    </div>

    <div
        class="hero-km"
        id="todayKm"
    >
        0,00 km
    </div>

    <div id="todayTime">
        00:00
    </div>

    <div id="todayPace">
        Pace 00:00
    </div>

    <div class="goal-row">

        <div
            class="goal"
            id="timeGoalStatus"
        >
            👎 Zeit-Ziel
        </div>

        <div
            class="goal"
            id="paceGoalStatus"
        >
            👎 Pace-Ziel
        </div>

    </div>

</div>

<div class="card">

    <h2>
        🎯 Ziele
    </h2>

    <input
        type="text"
        id="goalTimeInput"
        placeholder="Zeit-Ziel MM:SS"
    >

    <input
        type="text"
        id="goalPaceInput"
        placeholder="Pace-Ziel MM:SS"
    >

    <button
        class="save-btn"
        id="saveGoalsBtn"
    >
        Ziele speichern
    </button>

</div>

<div class="stats">

    <div class="card">

        <div>
            Gesamt-km
        </div>

        <div
            class="stat-number"
            id="totalKm"
        >
            0,00
        </div>

    </div>

    <div class="card">

        <div>
            Beste Pace
        </div>

        <div
            class="stat-number"
            id="bestPace"
        >
            00:00
        </div>

    </div>

    <div class="card">

        <div>
            Längster Walk
        </div>

        <div
            class="stat-number"
            id="longestWalk"
        >
            0,00 km
        </div>

    </div>

    <div class="card">

        <div>
            Längste Zeit
        </div>

        <div
            class="stat-number"
            id="longestTime"
        >
            00:00
        </div>

    </div>

</div>

<div class="card">

    <h2>
        📈 Kilometer Trend
    </h2>

    <div class="chart-box">
        <canvas id="kmChart"></canvas>
    </div>

</div>

<div class="card">

    <h2>
        ⚡ Pace Trend
    </h2>

    <div class="chart-box">
        <canvas id="paceChart"></canvas>
    </div>

</div>

<div class="card">

    <h2>
        📅 Monatskalender
    </h2>

    <div
        id="calendar"
        class="calendar"
    ></div>

</div>

<div class="card">

    <h2>
        🏆 Erfolge
    </h2>

    <div id="badges"></div>

</div>

<h2>
    📜 Verlauf
</h2>

<div id="history"></div>

<button
    class="fab"
    id="openModal"
>
    +
</button>

<div
    class="modal"
    id="modal"
>

    <div class="modal-content">

        <h2>
            Neuen Walk hinzufügen
        </h2>

        <input
            type="date"
            id="dateInput"
        >

        <input
            type="text"
            id="kmInput"
            placeholder="Kilometer 5,40"
        >

        <input
            type="text"
            id="timeInput"
            placeholder="Zeit MM:SS"
        >

        <div
            class="quick-notes"
            id="quickNotes"
        ></div>

        <textarea
            id="customNote"
            rows="4"
            placeholder="Eigene Bemerkung"
        ></textarea>

        <button
            class="save-btn"
            id="saveWalk"
        >
            Walk speichern
        </button>

    </div>

</div>

<script>

const STORAGE_KEY =
    "kathyWalkingStableV3";

const GOAL_STORAGE_KEY =
    "kathyWalkingGoalsStable";

const quickNotesOptions = [

    "Normal",
    "Regen",
    "Rückenschmerzen",
    "Kopfschmerzen",
    "unmotiviert",
    "wenig Zeit",
    "Krank",
    "Schnee und Glätte",
    "sehr warm"
];

let selectedNotes = [];

let editingId = null;

let kmChart = null;

let paceChart = null;

function loadWalks(){

    return JSON.parse(
        localStorage.getItem(
            STORAGE_KEY
        )
    ) || [];
}

function saveWalks(walks){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(walks)
    );
}

function loadGoals(){

    return JSON.parse(
        localStorage.getItem(
            GOAL_STORAGE_KEY
        )
    ) || {

        timeGoal:1800,
        paceGoal:600
    };
}

function saveGoals(goals){

    localStorage.setItem(
        GOAL_STORAGE_KEY,
        JSON.stringify(goals)
    );
}

function parseKm(value){

    return parseFloat(
        value.replace(",",".")
    );
}

function formatKm(value){

    return Number(value)
        .toFixed(2)
        .replace(".",",");
}

function parseMMSS(value){

    const parts =
        value.split(":");

    if(parts.length !== 2){
        return 0;
    }

    return (
        parseInt(parts[0]) * 60 +
        parseInt(parts[1])
    );
}

function formatMMSS(seconds){

    const mins =
        Math.floor(seconds / 60);

    const secs =
        Math.round(seconds % 60);

    return (
        String(mins)
            .padStart(2,"0")
        +
        ":"
        +
        String(secs)
            .padStart(2,"0")
    );
}

function calculatePace(
    duration,
    km
){

    return duration / km;
}

function renderQuickNotes(){

    const container =
        document.getElementById(
            "quickNotes"
        );

    container.innerHTML = "";

    quickNotesOptions.forEach(note=>{

        const button =
            document.createElement(
                "button"
            );

        button.className =
            "quick-btn";

        button.textContent =
            note;

        if(
            selectedNotes.includes(
                note
            )
        ){

            button.classList.add(
                "active"
            );
        }

        button.addEventListener(
            "click",
            ()=>{

                button.classList.toggle(
                    "active"
                );

                if(
                    selectedNotes.includes(
                        note
                    )
                ){

                    selectedNotes =
                        selectedNotes.filter(
                            n => n !== note
                        );

                } else {

                    selectedNotes.push(
                        note
                    );
                }
            }
        );

        container.appendChild(
            button
        );
    });
}

function renderCalendar(walks){

    const calendar =
        document.getElementById(
            "calendar"
        );

    calendar.innerHTML = "";

    const now = new Date();

    const year =
        now.getFullYear();

    const month =
        now.getMonth();

    const daysInMonth =
        new Date(
            year,
            month + 1,
            0
        ).getDate();

    for(let day=1;day<=daysInMonth;day++){

        const date =
            new Date(
                year,
                month,
                day
            )
            .toISOString()
            .split("T")[0];

        const walked =
            walks.some(
                w => w.date === date
            );

        const div =
            document.createElement(
                "div"
            );

        div.className =
            walked
            ? "day walked"
            : "day";

        div.textContent = day;

        calendar.appendChild(div);
    }
}

function renderCharts(walks){

    const reversed =
        [...walks].reverse();

    const labels =
        reversed.map(
            w => w.date
        );

    const kmData =
        reversed.map(
            w => w.kilometers
        );

    const paceData =
        reversed.map(
            w =>
                Number(
                    (
                        w.paceSeconds / 60
                    ).toFixed(2)
                )
        );

    if(kmChart){
        kmChart.destroy();
    }

    if(paceChart){
        paceChart.destroy();
    }

    kmChart = new Chart(

        document.getElementById(
            "kmChart"
        ),

        {

            type:"line",

            data:{

                labels,

                datasets:[{

                    label:"Kilometer",

                    data:kmData,

                    borderWidth:3,

                    tension:0.3
                }]
            }
        }
    );

    paceChart = new Chart(

        document.getElementById(
            "paceChart"
        ),

        {

            type:"line",

            data:{

                labels,

                datasets:[{

                    label:"Pace",

                    data:paceData,

                    borderWidth:3,

                    tension:0.3
                }]
            }
        }
    );
}

function renderStats(walks){

    const totalKm =
        walks.reduce(
            (s,w)=>
                s + w.kilometers,
            0
        );

    document.getElementById(
        "totalKm"
    ).textContent =
        formatKm(totalKm);

    const bestPace =
        walks.length
        ? Math.min(
            ...walks.map(
                w => w.paceSeconds
            )
        )
        : 0;

    document.getElementById(
        "bestPace"
    ).textContent =
        formatMMSS(bestPace);

    const longestWalk =
        walks.length
        ? Math.max(
            ...walks.map(
                w => w.kilometers
            )
        )
        : 0;

    document.getElementById(
        "longestWalk"
    ).textContent =
        formatKm(longestWalk)
        + " km";

    const longestTime =
        walks.length
        ? Math.max(
            ...walks.map(
                w => w.durationSeconds
            )
        )
        : 0;

    document.getElementById(
        "longestTime"
    ).textContent =
        formatMMSS(longestTime);

    if(walks.length > 0){

        const latest =
            walks[walks.length - 1];

        document.getElementById(
            "todayKm"
        ).textContent =
            formatKm(
                latest.kilometers
            )
            + " km";

        document.getElementById(
            "todayTime"
        ).textContent =
            formatMMSS(
                latest.durationSeconds
            );

        document.getElementById(
            "todayPace"
        ).textContent =
            "Pace "
            +
            formatMMSS(
                latest.paceSeconds
            );

        document.getElementById(
            "timeGoalStatus"
        ).textContent =
            latest.durationSeconds >=
            latest.goalTime
            ? "👍 Zeit-Ziel"
            : "👎 Zeit-Ziel";

        document.getElementById(
            "paceGoalStatus"
        ).textContent =
            latest.paceSeconds <=
            latest.goalPace
            ? "👍 Pace-Ziel"
            : "👎 Pace-Ziel";
    }
}

function renderBadges(walks){

    const badges =
        document.getElementById(
            "badges"
        );

    badges.innerHTML = "";

    if(walks.length >= 7){

        badges.innerHTML += `
            <div class="badge">
                🔥 7 Walks geschafft
            </div>
        `;
    }

    if(walks.length >= 30){

        badges.innerHTML += `
            <div class="badge">
                👑 30 Walks Jubiläum
            </div>
        `;
    }
}

function renderHistory(walks){

    const history =
        document.getElementById(
            "history"
        );

    history.innerHTML = "";

    walks
    .slice()
    .reverse()
    .forEach(walk=>{

        const card =
            document.createElement(
                "div"
            );

        card.className =
            "card walk-card";

        card.innerHTML = `

            <div>
                <strong>
                    ${walk.date}
                </strong>
            </div>

            <div class="walk-grid">

                <div class="value-box">

                    <div class="label">
                        Kilometer
                    </div>

                    <div>
                        ${formatKm(
                            walk.kilometers
                        )}
                    </div>

                </div>

                <div class="value-box">

                    <div class="label">
                        Zeit
                    </div>

                    <div>
                        ${formatMMSS(
                            walk.durationSeconds
                        )}
                    </div>

                </div>

                <div class="value-box">

                    <div class="label">
                        Pace
                    </div>

                    <div>
                        ${formatMMSS(
                            walk.paceSeconds
                        )}
                    </div>

                </div>

            </div>

            <div
                style="
                    margin-top:12px;
                    display:flex;
                    gap:12px;
                    flex-wrap:wrap;
                "
            >

                <div class="
                    ${
                        walk.durationSeconds >=
                        walk.goalTime
                        ? "good"
                        : "bad"
                    }
                ">

                    ${
                        walk.durationSeconds >=
                        walk.goalTime
                        ? "👍 Zeit-Ziel"
                        : "👎 Zeit-Ziel"
                    }

                </div>

                <div class="
                    ${
                        walk.paceSeconds <=
                        walk.goalPace
                        ? "good"
                        : "bad"
                    }
                ">

                    ${
                        walk.paceSeconds <=
                        walk.goalPace
                        ? "👍 Pace-Ziel"
                        : "👎 Pace-Ziel"
                    }

                </div>

            </div>

            <div class="notes">

                ${(walk.quickNotes || [])
                    .map(
                        note => `
                            <div class="note">
                                ${note}
                            </div>
                        `
                    )
                    .join("")
                }

            </div>

            ${
                walk.customNote
                ? `
                    <div class="custom-note">
                        "${walk.customNote}"
                    </div>
                `
                : ""
            }

            <div class="actions">

                <button
                    class="
                        action-btn
                        edit-btn
                    "
                    onclick="
                        editWalk(
                            '${walk.id}'
                        )
                    "
                >
                    ✏️ Bearbeiten
                </button>

                <button
                    class="
                        action-btn
                        delete-btn
                    "
                    onclick="
                        deleteWalk(
                            '${walk.id}'
                        )
                    "
                >
                    🗑️ Löschen
                </button>

            </div>
        `;

        history.appendChild(card);
    });
}

function editWalk(id){

    const walks =
        loadWalks();

    const walk =
        walks.find(
            w => w.id === id
        );

    editingId = id;

    document.getElementById(
        "dateInput"
    ).value =
        walk.date;

    document.getElementById(
        "kmInput"
    ).value =
        formatKm(
            walk.kilometers
        );

    document.getElementById(
        "timeInput"
    ).value =
        formatMMSS(
            walk.durationSeconds
        );

    document.getElementById(
        "customNote"
    ).value =
        walk.customNote || "";

    selectedNotes =
        [...walk.quickNotes];

    renderQuickNotes();

    document.getElementById(
        "modal"
    ).classList.add("open");
}

function deleteWalk(id){

    const walks =
        loadWalks().filter(
            w => w.id !== id
        );

    saveWalks(walks);

    renderApp();
}

function renderApp(){

    const walks =
        loadWalks();

    renderStats(walks);

    renderHistory(walks);

    renderCalendar(walks);

    renderBadges(walks);

    renderCharts(walks);

    const goals =
        loadGoals();

    document.getElementById(
        "goalTimeInput"
    ).value =
        formatMMSS(
            goals.timeGoal
        );

    document.getElementById(
        "goalPaceInput"
    ).value =
        formatMMSS(
            goals.paceGoal
        );
}

document.getElementById(
    "openModal"
).addEventListener(
    "click",
    ()=>{

        editingId = null;

        selectedNotes = [];

        renderQuickNotes();

        document.getElementById(
            "dateInput"
        ).value = "";

        document.getElementById(
            "kmInput"
        ).value = "";

        document.getElementById(
            "timeInput"
        ).value = "";

        document.getElementById(
            "customNote"
        ).value = "";

        document.getElementById(
            "modal"
        ).classList.add("open");
    }
);

document.getElementById(
    "saveGoalsBtn"
).addEventListener(
    "click",
    ()=>{

        saveGoals({

            timeGoal:
                parseMMSS(
                    document.getElementById(
                        "goalTimeInput"
                    ).value
                ),

            paceGoal:
                parseMMSS(
                    document.getElementById(
                        "goalPaceInput"
                    ).value
                )
        });

        renderApp();
    }
);

document.getElementById(
    "saveWalk"
).addEventListener(
    "click",
    ()=>{

        const date =
            document.getElementById(
                "dateInput"
            ).value;

        const kilometers =
            parseKm(
                document.getElementById(
                    "kmInput"
                ).value
            );

        const durationSeconds =
            parseMMSS(
                document.getElementById(
                    "timeInput"
                ).value
            );

        if(
            !date ||
            !kilometers ||
            !durationSeconds
        ){

            alert(
                "Bitte Felder ausfüllen."
            );

            return;
        }

        const paceSeconds =
            calculatePace(
                durationSeconds,
                kilometers
            );

        const goals =
            loadGoals();

        const walks =
            loadWalks();

        if(editingId){

            const walk =
                walks.find(
                    w =>
                    w.id === editingId
                );

            walk.date = date;

            walk.kilometers =
                kilometers;

            walk.durationSeconds =
                durationSeconds;

            walk.paceSeconds =
                paceSeconds;

            walk.quickNotes =
                selectedNotes;

            walk.customNote =
                document.getElementById(
                    "customNote"
                ).value;

        } else {

            walks.push({

                id:
                    crypto.randomUUID(),

                date,

                kilometers,

                durationSeconds,

                paceSeconds,

                goalTime:
                    goals.timeGoal,

                goalPace:
                    goals.paceGoal,

                quickNotes:
                    selectedNotes,

                customNote:
                    document.getElementById(
                        "customNote"
                    ).value
            });
        }

        saveWalks(walks);

        document.getElementById(
            "modal"
        ).classList.remove(
            "open"
        );

        renderApp();
    }
);

renderQuickNotes();

renderApp();

</script>

</body>
</html>
