<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Kathys Walking Eskalation</title><style>body{font-family:-apple-system;background:#111;color:#fff;padding:18px} .card{background:#1c1c1e;padding:16px;border-radius:18px;margin-bottom:16px} input,select,button,textarea{width:100%;padding:12px;border-radius:12px;border:none;margin-top:8px;background:#2c2c2e;color:#fff} button{background:gold;color:#111;font-weight:bold} table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid #333;text-align:center} .green{color:#32d74b;font-weight:bold}.red{color:#ff453a;font-weight:bold}.gold{color:gold;font-weight:bold}.badge{background:#2c2c2e;padding:10px;border-radius:12px;margin-top:10px}</style></head><body><h1>🚶✨ Kathys Walking Eskalation</h1><div class='card'><h2>💬 Motivation</h2><div id='motivation'></div></div><div class='card'><h2>➕ Walk hinzufügen</h2><input type='date' id='date'><input id='km' placeholder='Kilometer'><input id='mins' placeholder='Zeit MM:SS'><input id='pace' placeholder='Pace MM:SS'><select id='preset'><option>Normal</option><option>Regen</option><option>Rückenschmerzen</option><option>Kopfschmerzen</option><option>wenig Zeit</option><option>Schnee & Glätte</option><option>unmotiviert</option></select><textarea id='note' placeholder='Eigene Bemerkung'></textarea><button onclick='saveEntry()'>Speichern</button></div><div class='card'><h2>🎯 Ziele</h2><input id='goalMin' value='30:00'><input id='goalPace' value='08:30'></div><div class='card'><h2>📊 Statistik</h2><div id='stats'></div></div><div class='card'><h2>📈 Verlauf</h2><table><thead><tr><th>Datum</th><th>KM</th><th>Zeit</th><th>Pace</th><th>Bonus</th><th>Notiz</th><th>Aktion</th></tr></thead><tbody id='body'></tbody></table></div><script>let entries=JSON.parse(localStorage.getItem('kwe_entries')||'[]');document.getElementById('date').value=new Date().toISOString().split('T')[0];function parseTime(v){if(!v)return 0;let p=v.split(':');return parseInt(p[0])*60+parseInt(p[1]);}function fmt(v){let m=Math.floor(v/60);let s=v%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}function motivation(){const t=['🔥 Konstanz schlägt Motivation.','🚶 Jeder Walk zählt.','👑 Du ziehst das brutal durch.'];document.getElementById('motivation').innerHTML='<div class=badge>'+t[Math.floor(Math.random()*t.length)]+'</div>';}function saveEntry(){const e={id:Date.now(),date:date.value,km:parseFloat(km.value.replace(',','.')),mins:parseTime(mins.value),pace:parseTime(pace.value),note:preset.value+' '+note.value,goalMin:goalMin.value,goalPace:goalPace.value};entries.push(e);localStorage.setItem('kwe_entries',JSON.stringify(entries));render();motivation();}function deleteEntry(id){entries=entries.filter(e=>e.id!==id);localStorage.setItem('kwe_entries',JSON.stringify(entries));render();}function render(){entries.sort((a,b)=>new Date(b.date)-new Date(a.date));let body=document.getElementById('body');body.innerHTML='';let unique=new Set(entries.map(e=>e.date)).size;let totalKm=entries.reduce((a,b)=>a+b.km,0);document.getElementById('stats').innerHTML='<div class=badge>🚶 Tage: '+unique+'</div><div class=badge>📏 Gesamtkilometer: '+totalKm.toFixed(1).replace('.',',')+' km</div>';let bestKm=Math.max(...entries.map(e=>e.km),0);let bestPace=Math.min(...entries.filter(e=>e.pace>0).map(e=>e.pace),999999);let bestTime=Math.max(...entries.map(e=>e.mins),0);entries.forEach((e,i)=>{let c=entries[i+1];let kmc='',tc='',pc='';if(c){if(e.km>c.km)kmc='green';else if(e.km<c.km)kmc='red';if(e.mins>c.mins)tc='green';else if(e.mins<c.mins)tc='red';if(e.pace<c.pace)pc='green';else if(e.pace>c.pace)pc='red';}let bonus='';if(e.pace<=parseTime(e.goalPace)&&e.mins>=parseTime(e.goalMin))bonus='🔥🏆⭐';body.innerHTML+=`<tr><td>${new Date(e.date).toLocaleDateString('de-DE')}</td><td class='${e.km===bestKm?'gold':kmc}'>${e.km.toFixed(1).replace('.',',')}</td><td class='${e.mins===bestTime?'gold':tc}'>${fmt(e.mins)} ${e.mins>=parseTime(e.goalMin)?'👍':'👎'}</td><td class='${e.pace===bestPace?'gold':pc}'>${fmt(e.pace)} ${e.pace<=parseTime(e.goalPace)?'👍':'👎'}</td><td>${bonus}</td><td>${e.note}</td><td><button onclick='deleteEntry(${e.id})'>🗑️</button></td></tr>`;});}motivation();render();</script></body></html>
