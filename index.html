<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kathys Walking Eskalation V4.2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f8f5ef;
    margin:0;
    padding:18px;
    padding-bottom:120px;
    color:#2d2d2d;
}

.card{
    background:white;
    border-radius:28px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.level-card{
    background:linear-gradient(180deg,#fff4c7,#d4af37);
    color:white;
}

.level-number{
    font-size:2.6rem;
    font-weight:900;
}

.hero{
    border:3px solid #d4af37;
    background:linear-gradient(180deg,#fffdf7,#fff5d7);
}

.hero-km{
    font-size:2.8rem;
    font-weight:900;
}

.challenge{
    background:linear-gradient(180deg,#fff9e4,#fff0bb);
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.stat-number{
    font-size:1.5rem;
    font-weight:800;
    margin-top:8px;
}

.walk-card{
    border-left:8px solid #d4af37;
}

.walk-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:14px;
}

.value-box{
    background:#f7f3eb;
    border-radius:18px;
    padding:12px;
    text-align:center;
}

.notes{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
}

.note{
    background:#f4f1ea;
    padding:8px 12px;
    border-radius:999px;
    font-size:0.82rem;
}

button{
    border:none;
    border-radius:16px;
    cursor:pointer;
}

.fab{
    position:fixed;
    right:22px;
    bottom:22px;
    width:72px;
    height:72px;
    border-radius:50%;
    background:#d4af37;
    color:white;
    font-size:2rem;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:flex-end;
}

.modal.open{
    display:flex;
}

.modal-content{
    background:white;
    width:100%;
    border-radius:28px 28px 0 0;
    padding:22px;
}

input,
textarea{
    width:100%;
    margin-top:8px;
    margin-bottom:18px;
    padding:14px;
    border-radius:16px;
    border:1px solid #ddd;
    font-size:1rem;
}

.quick-notes{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
}

.quick-btn{
    background:#f4f1ea;
    padding:10px 14px;
    border-radius:999px;
}

.quick-btn.active{
    background:#d4af37;
    color:white;
}

.save-btn{
    width:100%;
    padding:16px;
    background:#d4af37;
    color:white;
    font-weight:800;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-top:16px;
}

.day{
    aspect-ratio:1;
    border-radius:14px;
    background:#f4f1ea;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.82rem;
    font-weight:700;
}

.day.walked{
    background:linear-gradient(180deg,#f7d978,#d4af37);
    color:white;
}

.badge{
    background:linear-gradient(180deg,#ffe89f,#d4af37);
    color:white;
    padding:14px;
    border-radius:20px;
    margin-top:12px;
    font-weight:800;
}

</style>
</head>

<body>

<div class="card level-card">

<div>👑 Walking Level</div>

<div class="level-number" id="levelNumber">
Level 1
</div>

<div id="xpText">
0 / 100 XP
</div>

</div>

<div class="card challenge">

<h2>🎯 Tageschallenge</h2>

<div id="challengeText">
Laufe heute mindestens 3 km
</div>

</div>

<div class="card hero">

<div>Letzter Walk</div>

<div class="hero-km" id="todayKm">
0,00 km
</div>

<div id="todayTime">
00:00
</div>

<div id="todayPace">
Pace 00:00
</div>

</div>

<div class="card">

<h2>🎯 Ziele</h2>

<input
    type="text"
    id="paceGoalInput"
    placeholder="Pace Ziel MM:SS"
>

<input
    type="text"
    id="timeGoalInput"
    placeholder="Zeit Ziel MM:SS"
>

<button
    class="save-btn"
    onclick="saveGoals()"
>
Ziele speichern
</button>

</div>

<div class="stats">

<div class="card">
<div>Gesamt-km</div>
<div class="stat-number" id="totalKm">0,00</div>
</div>

<div class="card">
<div>Beste Pace</div>
<div class="stat-number" id="bestPace">00:00</div>
</div>

<div class="card">
<div>Längster Walk</div>
<div class="stat-number" id="longestWalk">0,00 km</div>
</div>

<div class="card">
<div>Längste Zeit</div>
<div class="stat-number" id="longestTime">00:00</div>
</div>

</div>

<div class="card">

<h2>📈 Kilometer Trend</h2>

<canvas id="kmChart"></canvas>

</div>

<div class="card">

<h2>🏆 Erfolge</h2>

<div id="badges"></div>

</div>

<h2>📜 Verlauf</h2>

<div id="history"></div>

<button class="fab" id="openModal">
+
</button>

<div class="modal" id="modal">

<div class="modal-content">

<h2>Neuen Walk hinzufügen</h2>

<input type="date" id="dateInput">

<input
    type="text"
    id="kmInput"
    placeholder="Kilometer 5,40"
>

<input
    type="text"
    id="timeInput"
    placeholder="Zeit MM:SS"
>

<div class="quick-notes" id="quickNotes"></div>

<textarea
    id="customNote"
    rows="4"
    placeholder="Eigene Bemerkung"
></textarea>

<button class="save-btn" id="saveWalk">
Walk speichern
</button>

</div>
</div>

<script>

const STORAGE_KEY =
    "kathyWalkingStableV42";

const GOAL_KEY =
    "kathyWalkingGoalsV42";

const quickNotesOptions = [

    "Normal",
    "Regen",
    "Rückenschmerzen",
    "Kopfschmerzen",
    "unmotiviert",
    "wenig Zeit",
    "Krank",
    "Schnee und Glätte",
    "sehr warm"
];

let selectedNotes = [];

function loadWalks(){

    return JSON.parse(
        localStorage.getItem(STORAGE_KEY)
    ) || [];
}

function saveWalks(walks){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(walks)
    );
}

function loadGoals(){

    return JSON.parse(
        localStorage.getItem(GOAL_KEY)
    ) || {

        paceGoal:"09:30",
        timeGoal:"45:00"
    };
}

function saveGoals(){

    const goals = {

        paceGoal:
            document.getElementById("paceGoalInput").value,

        timeGoal:
            document.getElementById("timeGoalInput").value
    };

    localStorage.setItem(
        GOAL_KEY,
        JSON.stringify(goals)
    );

    alert("Ziele gespeichert");
}

function renderGoals(){

    const goals = loadGoals();

    document.getElementById("paceGoalInput").value =
        goals.paceGoal;

    document.getElementById("timeGoalInput").value =
        goals.timeGoal;
}

function parseKm(value){

    return parseFloat(
        value.replace(",",".")
    );
}

function formatKm(value){

    return Number(value)
        .toFixed(2)
        .replace(".",",");
}

function parseMMSS(value){

    const parts = value.split(":");

    return (
        parseInt(parts[0]) * 60
        +
        parseInt(parts[1])
    );
}

function formatMMSS(seconds){

    const mins =
        Math.floor(seconds / 60);

    const secs =
        Math.round(seconds % 60);

    return (
        String(mins).padStart(2,"0")
        +
        ":"
        +
        String(secs).padStart(2,"0")
    );
}

function renderQuickNotes(){

    const container =
        document.getElementById("quickNotes");

    container.innerHTML = "";

    quickNotesOptions.forEach(note=>{

        const button =
            document.createElement("button");

        button.className = "quick-btn";

        button.textContent = note;

        button.onclick = ()=>{

            button.classList.toggle("active");

            if(selectedNotes.includes(note)){

                selectedNotes =
                    selectedNotes.filter(
                        n => n !== note
                    );

            } else {

                selectedNotes.push(note);
            }
        };

        container.appendChild(button);
    });
}

function renderApp(){

    const walks = loadWalks();

    renderGoals();

    document.getElementById("totalKm").textContent =
        formatKm(
            walks.reduce(
                (s,w)=>s+w.kilometers,
                0
            )
        );

    if(walks.length){

        const latest =
            walks[walks.length - 1];

        document.getElementById("todayKm").textContent =
            formatKm(latest.kilometers)
            + " km";

        document.getElementById("todayTime").textContent =
            formatMMSS(latest.durationSeconds);

        document.getElementById("todayPace").textContent =
            "Pace "
            +
            formatMMSS(latest.paceSeconds);
    }

    const history =
        document.getElementById("history");

    history.innerHTML = "";

    walks
    .sort(
        (a,b)=>
            new Date(b.date)
            -
            new Date(a.date)
    )
    .forEach(walk=>{

        const card =
            document.createElement("div");

        card.className =
            "card walk-card";

        card.innerHTML = `

            <strong>${walk.date}</strong>

            <div class="walk-grid">

                <div class="value-box">
                    ${formatKm(walk.kilometers)} km
                </div>

                <div class="value-box">
                    ${formatMMSS(walk.durationSeconds)}
                </div>

                <div class="value-box">
                    ${formatMMSS(walk.paceSeconds)}
                </div>

            </div>

            <div class="notes">

                ${(walk.quickNotes || [])
                    .map(
                        note => `
                            <div class="note">
                                ${note}
                            </div>
                        `
                    )
                    .join("")
                }

            </div>

            <div style="margin-top:12px;font-weight:800;">
                ${walk.goalResult || ""}
            </div>
        `;

        history.appendChild(card);
    });
}

document.getElementById("openModal").onclick = ()=>{

    selectedNotes = [];

    renderQuickNotes();

    document.getElementById("modal")
        .classList.add("open");
};

document.getElementById("saveWalk").onclick = ()=>{

    const date =
        document.getElementById("dateInput").value;

    const kilometers =
        parseKm(
            document.getElementById("kmInput").value
        );

    const durationSeconds =
        parseMMSS(
            document.getElementById("timeInput").value
        );

    const paceSeconds =
        durationSeconds / kilometers;

    const goals =
        loadGoals();

    const paceGoalSeconds =
        parseMMSS(goals.paceGoal);

    const timeGoalSeconds =
        parseMMSS(goals.timeGoal);

    let goalResult = "";

    if(paceSeconds <= paceGoalSeconds){

        goalResult +=
            "👍 Pace Ziel geschafft ";

    } else {

        goalResult +=
            "👎 Pace Ziel verpasst ";
    }

    if(durationSeconds >= timeGoalSeconds){

        goalResult +=
            "👍 Zeit Ziel geschafft";

    } else {

        goalResult +=
            "👎 Zeit Ziel verpasst";
    }

    const walks = loadWalks();

    walks.push({

        date,

        kilometers,

        durationSeconds,

        paceSeconds,

        quickNotes:selectedNotes,

        customNote:
            document.getElementById("customNote").value,

        goalResult
    });

    saveWalks(walks);

    document.getElementById("modal")
        .classList.remove("open");

    renderApp();
};

renderQuickNotes();

renderApp();

</script>

</body>
</html>
